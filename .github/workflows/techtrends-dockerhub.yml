name: TechTrends - Package with Docker

# Trigger the workflow on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Context is the project directory containing the application + Dockerfile
          context: ./techtrends
          # Reference the TechTrends Dockerfile
          file: ./techtrends/Dockerfile
          platforms: linux/amd64
          push: true
          # Push to DockerHub as <your-dockerhub-username>/techtrends:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/techtrends:latest
