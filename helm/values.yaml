# Default values for the TechTrends Helm chart.
# These act as the defaults (sandbox environment).

namespace:
  name: sandbox

image:
  repository: harikishandande/techtrends
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

containerPort: 3111

service:
  port: 4111
  targetPort: 3111
  protocol: TCP
  type: ClusterIP

resources:
  requests:
    memory: 64Mi
    cpu: 250m
  limits:
    memory: 128Mi
    cpu: 500m

livenessProbe:
  path: /healthz

readinessProbe:
  path: /healthz
