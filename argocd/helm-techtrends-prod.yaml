apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techtrends-prod
  namespace: argocd
spec:
  project: default
  source:
    # >>> CHANGE THIS to your own GitHub repository URL <<<
    repoURL: https://github.com/<your-github-username>/<your-repo>.git
    targetRevision: HEAD
    # Path to the Helm chart inside your repo.
    # If your repo root contains the project folder, use: project/helm
    path: helm
    helm:
      valueFiles:
      - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
